name: re2
description: >-
  Linear-time regular expressions for Dart via Google's RE2 over FFI. Immune to
  catastrophic backtracking (ReDoS).
version: 0.2.0
repository: https://github.com/Yusufihsangorgel/re2
issue_tracker: https://github.com/Yusufihsangorgel/re2/issues

topics:
  - regex
  - re2
  - security
  - ffi
  - performance

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.0
  hooks: ^2.1.0
  native_toolchain_c: ^0.19.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
