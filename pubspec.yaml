name: re2
description: >-
  Linear-time regular expressions for Dart via Google's RE2 over FFI. Immune to
  catastrophic backtracking (ReDoS).
version: 0.3.2
repository: https://github.com/Yusufihsangorgel/re2
issue_tracker: https://github.com/Yusufihsangorgel/re2/issues

topics:
  - regex
  - re2
  - security
  - ffi
  - performance

screenshots:
  - description: >-
      Time to match /(a+)+$/ as the input grows: dart:core RegExp reaches 2866 m
      s at 28 characters and would not finish at 30, while re2 stays flat, 1.7 m
      s at 100,000.
    path: doc/architecture.png

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.0
  hooks: ^2.1.0
  native_toolchain_c: ^0.19.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
