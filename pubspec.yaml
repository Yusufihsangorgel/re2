name: re2
description: >-
  Linear-time regular expressions for Dart via Google's RE2 over FFI. Immune to
  catastrophic backtracking (ReDoS).
version: 0.5.1
repository: https://github.com/Yusufihsangorgel/re2
issue_tracker: https://github.com/Yusufihsangorgel/re2/issues

topics:
  - regex
  - re2
  - security
  - ffi
  - performance

screenshots:
  - description: >-
      Time to match /(a+)+$/ as input grows: dart:core RegExp hits 2866 ms at 28
       characters, while re2 stays flat, 1.7 ms at 100,000.
    path: doc/architecture.png

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.0
  hooks: '>=2.0.2 <3.0.0'
  native_toolchain_c: '>=0.19.2 <0.20.0'

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
