<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" font-family="Menlo, monospace">
  <rect width="1200" height="400" fill="#0B1220"/>
  <!-- düz güvenli çizgi (RE2) + patlayan tehlike eğrisi (backtracking) -->
  <line x1="60" y1="330" x2="1140" y2="330" stroke="#38BDF8" stroke-width="2.5" opacity="0.8"/>
  <path d="M60,359 L71,358 L82,358 L93,357 L104,356 L115,355 L126,354 L137,352 L148,349 L159,346 L170,341 L181,335 L192,327 L203,315 L214,301 L225,281 L236,254 L247,218 L258,171 L269,107 L280,60" stroke="#F87171" stroke-width="2.5" fill="none" opacity="0.85"/>
  <text x="700" y="150" font-size="15" fill="#F87171" opacity="0.7">backtracking: O(2^n)</text>
  <text x="700" y="316" font-size="15" fill="#38BDF8" opacity="0.8">re2: O(n)</text>
  <text x="64" y="230" font-size="66" font-weight="bold" fill="#E2E8F0">re2</text>
  <text x="66" y="272" font-size="23" fill="#94A3B8">Linear-time regular expressions, immune to ReDoS</text>
</svg>
