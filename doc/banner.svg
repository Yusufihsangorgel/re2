<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- type lockup, lower left -->
  <rect x="66" y="200" width="44" height="6" fill="#38BDF8"/>
  <text x="64" y="292" font-family="Menlo, monospace" font-size="64" font-weight="bold" fill="#E2E8F0">re2</text>
  <text x="66" y="338" font-family="Menlo, monospace" font-size="24" fill="#94A3B8">Linear-time regular expressions, immune to ReDoS</text>

  <!-- motif: two time-complexity curves, exponential (dim, blows up) vs linear (accent, flat) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
    <!-- axes -->
    <path d="M 856 268 L 856 116" stroke="#1E3A5F"/>
    <path d="M 856 268 L 1084 268" stroke="#1E3A5F"/>
    <!-- exponential curve (backtracking): flat then explodes up -->
    <path d="M 862 262 C 960 258, 1004 250, 1030 200 C 1046 168, 1050 140, 1052 120" stroke="#1E3A5F"/>
    <!-- linear curve (RE2): gentle straight rise, accented -->
    <path d="M 862 260 L 1078 214" stroke="#38BDF8"/>
    <!-- label dots at curve ends -->
    <circle cx="1052" cy="120" r="5" fill="#1E3A5F"/>
    <circle cx="1078" cy="214" r="6" fill="#38BDF8"/>
  </g>
</svg>
