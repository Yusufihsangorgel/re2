<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="480" viewBox="0 0 1100 480" font-family="Menlo, monospace">
  <rect width="1100" height="480" fill="#0B1220"/>
  <text x="60" y="52" font-size="23" font-weight="bold" fill="#E2E8F0">Time to match /(a+)+$/ as the input grows</text>
  <text x="60" y="78" font-size="14" fill="#94A3B8">A backtracking engine turns a few extra characters into seconds. RE2 does not.</text>

  <!-- axes -->
  <line x1="120" y1="410" x2="1000" y2="410" stroke="#334155" stroke-width="1.5"/>
  <line x1="120" y1="410" x2="120" y2="110" stroke="#334155" stroke-width="1.5"/>
  <text x="1000" y="436" font-size="13" fill="#64748B" text-anchor="end">input length (characters)</text>
  <text x="60" y="120" font-size="13" fill="#64748B">time</text>
  <!-- x ticks -->
  <text x="120" y="432" font-size="12" fill="#64748B" text-anchor="middle">0</text>
  <text x="470" y="432" font-size="12" fill="#64748B" text-anchor="middle">20</text>
  <text x="640" y="432" font-size="12" fill="#64748B" text-anchor="middle">28</text>
  <text x="820" y="432" font-size="12" fill="#64748B" text-anchor="middle">36</text>

  <!-- RE2 flat line (safe) -->
  <path d="M120 405 L1000 402" stroke="#38BDF8" stroke-width="3" fill="none"/>
  <circle cx="640" cy="404" r="5" fill="#38BDF8"/>
  <text x="655" y="398" font-size="13" fill="#38BDF8">re2: 0.7 ms at n=28, 1.7 ms at n=100000</text>

  <!-- backtracking exponential curve (danger) -->
  <path d="M120 408 C 360 406, 500 400, 590 360 C 640 335, 665 250, 678 130" stroke="#F87171" stroke-width="3" fill="none"/>
  <circle cx="640" cy="250" r="5" fill="#F87171"/>
  <text x="470" y="180" font-size="13.5" fill="#F87171">dart:core RegExp</text>
  <text x="470" y="200" font-size="13.5" fill="#F87171">2866 ms at n=28</text>
  <text x="470" y="220" font-size="12.5" fill="#94A3B8">n=30 would not finish</text>

  <text x="120" y="466" font-size="12.5" fill="#64748B">Measured, Apple Silicon, Dart 3.11. Same pattern, same machine; only the engine changes.</text>
</svg>
